<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 | Ved Panse</title>
  <meta name="description" content="The page you requested could not be found." />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="color-scheme" content="light dark" />
  <script>
    try {
      document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
    } catch (error) {
      document.documentElement.dataset.theme = "light";
    }
  </script>
  <link rel="icon" href="img.png" />
  <link rel="stylesheet" href="styles/app.css" />
  <style>
    body {
      min-height: 100dvh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(0, 113, 227, 0.08), rgba(0, 113, 227, 0) 26%),
        linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 100%);
      color: #1d1d1f;
    }

    html[data-theme="dark"] body {
      background:
        radial-gradient(circle at 50% 22%, rgba(64, 129, 255, 0.14), rgba(64, 129, 255, 0) 24%),
        linear-gradient(180deg, #08090c 0%, #111216 100%);
      color: #f5f5f7;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .global-nav {
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    html[data-theme="dark"] .global-nav {
      border-bottom-color: rgba(255, 255, 255, 0.06);
    }

    .nav-inner {
      grid-template-columns: 1fr auto;
    }

    .nav-links {
      justify-self: end;
      gap: 18px;
      font-size: 12px;
    }

    .error-shell {
      min-height: calc(100dvh - var(--nav-height));
      display: grid;
      place-items: center;
      padding: clamp(56px, 10vw, 132px) 20px;
    }

    .error-panel {
      width: min(760px, 100%);
      display: grid;
      justify-items: center;
      text-align: center;
      gap: 28px;
    }

    .error-copy {
      display: grid;
      gap: 24px;
      align-content: center;
      justify-items: center;
    }

    .error-kicker {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #6e6e73;
    }

    html[data-theme="dark"] .error-kicker {
      color: #a1a1a6;
    }

    .error-title {
      margin: 0;
      font-size: clamp(84px, 19vw, 180px);
      line-height: 0.88;
      letter-spacing: -0.03em;
      font-weight: 600;
    }

    .error-title span {
      display: block;
    }

    .error-description {
      margin: 0;
      max-width: 24ch;
      font-size: clamp(21px, 2.8vw, 32px);
      line-height: 1.15;
      letter-spacing: -0.005em;
      color: #424245;
    }

    html[data-theme="dark"] .error-description {
      color: #d2d2d7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 10px;
    }

    .button {
      min-height: 44px;
      padding: 11px 21px;
      border-radius: 999px;
      border: 1px solid transparent;
      font: inherit;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-1px);
      outline: none;
    }

    .button-primary {
      background: #0071e3;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(0, 113, 227, 0.22);
    }

    .button-primary:hover,
    .button-primary:focus-visible {
      background: #0077ed;
    }

    .status-note {
      margin-top: 8px;
      font-size: 14px;
      letter-spacing: 0.01em;
      color: #6e6e73;
    }

    html[data-theme="dark"] .status-note {
      color: #8e8e93;
    }

    @media (max-width: 720px) {
      .nav-inner {
        padding: 0 16px;
      }

      .nav-logo {
        font-size: 18px;
      }

      .nav-links {
        gap: 12px;
      }
    }

    @media (max-width: 540px) {
      .nav-links a:nth-child(n + 3) {
        display: none;
      }

      .error-shell {
        padding-inline: 16px;
        padding-block: 48px 72px;
      }

      .actions {
        width: min(320px, 100%);
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <nav class="global-nav" aria-label="Primary">
      <div class="nav-inner">
        <a class="nav-logo" href="/" aria-label="Home">Ved Panse</a>
        <div class="nav-links">
          <a href="/">Home</a>
          <a href="/#projects">Projects</a>
          <a href="/#work">Work</a>
          <a href="/#research">Research</a>
          <a href="/#blogs">Blogs</a>
          <a href="/#contact">Contact</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="error-shell">
    <section class="error-panel" aria-labelledby="error-title">
      <div class="error-copy">
        <p class="error-kicker">Error 404</p>
        <h1 class="error-title" id="error-title">404</h1>
        <p class="error-description">The page you’re looking for can’t be found.</p>
        <div class="actions">
          <a class="button button-primary" href="/">Go to homepage</a>
        </div>
        <p class="status-note">Check the URL, or return to the main site.</p>
      </div>
    </section>
  </main>

  <script type="module" src="scripts/footer.js"></script>
</body>

</html>
